version: '3.8'
services:
  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - app-network
    restart: unless-stopped

  worker:
    build: ./worker
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - whatsapp_sessions:/app/auth_data
    networks:
      - app-network
    depends_on:
      - api
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  whatsapp_sessions:
    driver: local